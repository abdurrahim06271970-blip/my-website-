<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Match Details</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(to bottom right, #e0f7e9, #ffffff);
      text-align: center;
    }

    h1 {
      color: green;
      margin-top: 20px;
    }

    .box {
      background: white;
      margin: 20px auto;
      padding: 20px;
      width: 90%;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: left;
    }

    .teams {
      font-size: 22px;
      font-weight: bold;
      color: green;
      margin-bottom: 10px;
    }

    .info {
      margin: 8px 0;
    }

    .score {
      background: #f2f2f2;
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
      white-space: pre-line;
    }

    .result {
      margin-top: 10px;
      font-weight: bold;
      color: darkgreen;
    }

    .back {
      display: inline-block;
      margin: 20px;
      padding: 10px 15px;
      background: green;
      color: white;
      border-radius: 6px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<h1>🏏 Match Details</h1>

<div class="box" id="matchData">
  Loading...
</div>

<a href="fixtures.html" class="back">⬅ Back to Fixtures</a>

<script>
  // 🔥 DEFAULT DATA (backup)
  const defaultData = {
    1: {
      teams: "Team A vs Team B",
      date: "10 April",
      stadium: "Kaliganj Ground",
      time: "4:00 PM",
      score: "Team A: 120/6 (10 ov)\nTeam B: 100/9 (10 ov)",
      result: "Team A won by 20 runs"
    },
    2: {
      teams: "Team C vs Team D",
      date: "11 April",
      stadium: "Main Field",
      time: "6:00 PM",
      score: "Team C: 150/5 (10 ov)\nTeam D: 151/4 (9.3 ov)",
      result: "Team D won by 6 wickets"
    }
  };

  // 🔥 ADMIN PANEL DATA (localStorage)
  let savedData = JSON.parse(localStorage.getItem("matches")) || {};

  // 🔥 MERGE (admin data priority)
  const data = { ...defaultData, ...savedData };

  // 🔥 GET ID
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  const match = data[id];

  if(match){
    document.getElementById("matchData").innerHTML = `
      <div class="teams">${match.teams}</div>

      <div class="info">📅 Date: ${match.date}</div>
      <div class="info">📍 Stadium: ${match.stadium}</div>
      <div class="info">🕒 Time: ${match.time}</div>

      <div class="score"><b>Score:</b><br>${match.score}</div>

      <div class="result">🏆 ${match.result}</div>
    `;
  } else {
    document.getElementById("matchData").innerHTML = `
      <div class="teams">❌ Match Not Found</div>
    `;
  }
</script>

</body>
</html>
