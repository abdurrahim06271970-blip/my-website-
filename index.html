<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VCL Home</title>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      margin: 0;
      text-align: center;
    }

    /* 🔥 MENU */
    .menu {
      background: green;
      padding: 15px;
    }

    .menu a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
    }

    h1 {
      color: green;
      margin: 20px;
    }

    .card {
      background: white;
      margin: 15px auto;
      padding: 15px;
      width: 90%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <!-- 🔥 MENU -->
  <div class="menu">
    <a href="index.html" data-page="index">Home</a>
    <a href="fixtures.html" data-page="fixtures">Fixtures</a>
    <a href="points.html" data-page="points">Points Table</a>
    <a href="squad.html" data-page="squad">Squad</a>
  </div>

  <h1>🏏 VCL Cricket League</h1>

  <div class="card">
    Welcome to VCL Official Website
  </div>

  <!-- 🔥 SCRIPT (THIS DOES MAGIC) -->
  <script>
    // current page name
    let currentPage = "index";

    let links = document.querySelectorAll(".menu a");

    links.forEach(link => {
      if (link.getAttribute("data-page") === currentPage) {
        link.style.display = "none"; // 🔥 hide current page menu
      }
    });
  </script>

</body>
</html>
