<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fixtures</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  text-align: center;
  background: linear-gradient(135deg, #1e3c72, #2a5298, #6a11cb);
}

/* MENU */
.menu {
  background: rgba(0,0,0,0.4);
  padding: 15px;
}

.menu a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
  font-weight: bold;
}

.menu a.active {
  border-bottom: 3px solid white;
}

h1 {
  color: white;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.95);
  margin: 15px auto;
  padding: 15px;
  width: 90%;
  border-radius: 12px;
  text-align: left;
  cursor: pointer;
}

/* STATUS */
.status {
  padding: 5px 10px;
  border-radius: 5px;
  color: white;
  font-size: 12px;
}

.finished { background: gray; }
.upcoming { background: orange; }

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  overflow-y: auto;
}

.modal-content {
  background: white;
  width: 95%;
  margin: 25px auto;
  padding: 20px;
  border-radius: 12px;
  text-align: left;
}

.close {
  float: right;
  font-size: 25px;
  cursor: pointer;
}

/* SECTION */
.section {
  margin-top: 15px;
  padding: 10px;
  background: #f5f5f5;
  border-left: 4px solid #1e3c72;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ddd;
  padding: 6px;
  text-align: center;
}

th {
  background: #1e3c72;
  color: white;
}
</style>

</head>

<body>

<div class="menu">
  <a href="index.html">Home</a>
  <a href="fixtures.html" class="active">Fixtures</a>
  <a href="points.html">Points Table</a>
  <a href="squad.html">Teams</a>
</div>

<h1>🗓️ Fixtures</h1>

<!-- MATCH -->
<div class="card" onclick="openScorecard('1')">
  <h3>Team X vs Team Y</h3>
  <p>🏏 Finished Match</p>
  <span class="status finished">Finished</span>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <div id="scorecard"></div>
  </div>
</div>

<script>
function openScorecard(id){

let data = "";

if(id === "1"){
data = `
<h2>🏏 Full Match Scorecard (2 Innings)</h2>

<div class="section">
<h3>🪙 Toss</h3>
<p>Team X won the toss and chose to bat</p>
</div>

<!-- INNINGS 1 -->
<div class="section">
<h2>1st Innings - Team X</h2>

<h3>Batting</h3>
<table>
<tr><th>Player</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th><th>Dismissal</th></tr>
<tr><td>Player 1</td><td>45</td><td>30</td><td>4</td><td>2</td><td>150</td><td>c & b</td></tr>
<tr><td>Player 2</td><td>32</td><td>18</td><td>3</td><td>1</td><td>177</td><td>lbw</td></tr>
</table>

<h3>Extras</h3>
<p>W: 5 | NB: 1 | B: 2 | LB: 1</p>

<h3>Fall of Wickets</h3>
<p>1-20, 2-55, 3-90, 4-120</p>

<h3>Bowling (Team Y)</h3>
<table>
<tr><th>Bowler</th><th>O</th><th>M</th><th>R</th><th>W</th><th>Econ</th></tr>
<tr><td>Bowler 1</td><td>4</td><td>0</td><td>25</td><td>2</td><td>6.25</td></tr>
<tr><td>Bowler 2</td><td>4</td><td>1</td><td>30</td><td>1</td><td>7.50</td></tr>
</table>
</div>

<!-- INNINGS 2 -->
<div class="section">
<h2>2nd Innings - Team Y</h2>

<h3>Batting</h3>
<table>
<tr><th>Player</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th><th>Dismissal</th></tr>
<tr><td>Player A</td><td>40</td><td>28</td><td>3</td><td>2</td><td>142</td><td>caught</td></tr>
<tr><td>Player B</td><td>35</td><td>22</td><td>4</td><td>1</td><td>159</td><td>bowled</td></tr>
</table>

<h3>Extras</h3>
<p>W: 3 | NB: 2 | B: 1 | LB: 0</p>

<h3>Fall of Wickets</h3>
<p>1-15, 2-50, 3-80, 4-110</p>

<h3>Bowling (Team X)</h3>
<table>
<tr><th>Bowler</th><th>O</th><th>M</th><th>R</th><th>W</th><th>Econ</th></tr>
<tr><td>Bowler A</td><td>4</td><td>0</td><td>20</td><td>3</td><td>5.0</td></tr>
<tr><td>Bowler B</td><td>4</td><td>0</td><td>35</td><td>1</td><td>8.7</td></tr>
</table>
</div>

<!-- RESULT -->
<div class="section">
<h2>🏆 Result</h2>
<p><b>Team X won by 20 runs</b></p>
</div>

`;
}

document.getElementById("scorecard").innerHTML = data;
document.getElementById("modal").style.display = "block";
}

function closeModal(){
document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
