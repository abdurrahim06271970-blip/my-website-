<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fixtures</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  text-align: center;
  background: linear-gradient(135deg, #1e3c72, #2a5298, #6a11cb);
}

/* MENU */
.menu {
  background: rgba(0,0,0,0.4);
  padding: 15px;
}

.menu a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
  font-weight: bold;
}

.menu a.active {
  border-bottom: 3px solid white;
}

h1 {
  color: white;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.95);
  margin: 15px auto;
  padding: 15px;
  width: 90%;
  border-radius: 12px;
  text-align: left;
  cursor: pointer;
}

/* STATUS */
.status {
  padding: 5px 10px;
  border-radius: 5px;
  color: white;
  font-size: 12px;
}

.finished { background: gray; }

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  overflow-y: auto;
}

.modal-content {
  background: white;
  width: 95%;
  margin: 25px auto;
  padding: 20px;
  border-radius: 12px;
}

.close {
  float: right;
  font-size: 25px;
  cursor: pointer;
}

/* SUMMARY STYLE */
.summary {
  text-align: center;
}

.section {
  margin-top: 15px;
  padding: 10px;
  background: #f5f5f5;
  border-left: 4px solid #1e3c72;
}
</style>

</head>

<body>

<div class="menu">
  <a href="index.html">Home</a>
  <a href="fixtures.html" class="active">Fixtures</a>
  <a href="points.html">Points Table</a>
  <a href="squad.html">Teams</a>
</div>

<h1>🗓️ Fixtures</h1>

<!-- MATCH -->

<!-- MODAL -->
<div id="modal" class="modal">

    <span class="close" onclick="closeModal()">&times;</span>
    <div id="scorecard"></div>
  </div>
</div>

</div>

<div class="section">

<h2>152-10</h2>

<p><b>AHMED JAWID</b> 82 (46)</p>
<p><b>RAJBIR VIRK</b> 16 (26)</p>
<p><b>SUNIL SWOOD</b> 11 (09)</p>
<p><b>GURBIR SINGH</b> 11 (11)</p>

<h4>Bowling</h4>
<p>SOHAM S SANE 5-28 (3.5)</p>
<p>SAXON JEH 3-17 (4.0)</p>
<p>SCOTT GP PALON 1-24 (3.0)</p>
<p>HUNAR VARMA 0-22 (4.0)</p>
</div>

<div class="section">
<h3>BRISBANE STARS</h3>
<h2>81-10</h2>
<p>15.2 OVERS</p>

<p><b>AJAY EMMANUEL</b> 19 (21)</p>

<p><b>MLLAN REJI SCARIA</b> 09 (12)</p>
<p><b>SOHAM S SANE</b> 08 (13)</p>

<h4>Bowling</h4>

<p>SYED MONIB 2-26 (4.0)</p>
<p>GURBIR SINGH 1-7 (1.2)</p>
</div>

<div class="section" style="text-align:center">
<h2>🏆 BRISBANE STARS WON BY 71 RUNS</h2>
</div>
`;
}

document.getElementById("scorecard").innerHTML = data;
document.getElementById("modal").style.display = "block";
}

function closeModal(){
document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
