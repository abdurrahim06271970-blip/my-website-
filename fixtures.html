<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fixtures</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  text-align: center;
  background: linear-gradient(135deg, #1e3c72, #2a5298, #6a11cb);
}

/* MENU */
.menu {
  background: rgba(0,0,0,0.4);
  padding: 15px;
}

.menu a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
  font-weight: bold;
}

.menu a.active {
  border-bottom: 3px solid white;
}

h1 {
  color: white;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.95);
  margin: 15px auto;
  padding: 15px;
  width: 90%;
  border-radius: 12px;
  text-align: left;
  cursor: pointer;
}

/* STATUS */
.status {
  padding: 5px 10px;
  border-radius: 5px;
  color: white;
  font-size: 12px;
}

.finished { background: gray; }
.upcoming { background: orange; }

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  overflow-y: auto;
}

.modal-content {
  background: white;
  width: 95%;
  margin: 40px auto;
  padding: 20px;
  border-radius: 12px;
  text-align: left;
}

.close {
  float: right;
  font-size: 25px;
  cursor: pointer;
}

/* SCORE STYLE */
.section {
  margin-top: 15px;
  padding: 10px;
  border-left: 4px solid #1e3c72;
  background: #f5f5f5;
}
</style>

</head>

<body>

<div class="menu">
  <a href="index.html">Home</a>
  <a href="fixtures.html" class="active">Fixtures</a>
  <a href="points.html">Points Table</a>
  <a href="squad.html">Teams</a>
</div>

<h1>🗓️ Fixtures</h1>

<!-- FINISHED FIRST -->
<div class="card" onclick="openScorecard('1')">
  <h3>Team X vs Team Y</h3>
  <p>🏆 Result: Team X won</p>
  <span class="status finished">Finished</span>
</div>

<div class="card" onclick="openScorecard('2')">
  <h3>Team A vs Team C</h3>
  <p>🏆 Result: Team C won</p>
  <span class="status finished">Finished</span>
</div>

<!-- UPCOMING -->
<div class="card" onclick="openScorecard('3')">
  <h3>Team A vs Team B</h3>
  <p>📅 Date: 10 April</p>
  <span class="status upcoming">Upcoming</span>
</div>

<div class="card" onclick="openScorecard('4')">
  <h3>Team C vs Team D</h3>
  <p>📅 Date: 11 April</p>
  <span class="status upcoming">Upcoming</span>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <div id="scorecard"></div>
  </div>
</div>

<script>
function openScorecard(id){

let data = "";

/* MATCH 1 FULL SCORECARD */
if(id === "1"){
data = `
<h2>🏏 Scorecard</h2>

<div class="section">
<h3>Batting (Team X)</h3>
<p>Player 1 - 45 (30)</p>
<p>Player 2 - 32 (18)</p>
<p>Player 3 - 20 (15)</p>
<p>Total: 145/7</p>
</div>

<div class="section">
<h3>Bowling (Team Y)</h3>
<p>Bowler 1 - 2/25 (3 overs)</p>
<p>Bowler 2 - 1/30 (3 overs)</p>
</div>

<h3>🏆 Team X won by 20 runs</h3>
`;
}

/* MATCH 2 */
else if(id === "2"){
data = `
<h2>🏏 Scorecard</h2>

<div class="section">
<h3>Batting (Team A)</h3>
<p>Player 1 - 60 (35)</p>
<p>Player 2 - 40 (25)</p>
<p>Total: 160/6</p>
</div>

<div class="section">
<h3>Bowling (Team C)</h3>
<p>Bowler 1 - 3/20</p>
<p>Bowler 2 - 1/35</p>
</div>

<h3>🏆 Team C won by 5 wickets</h3>
`;
}

/* UPCOMING */
else {
data = `
<h2>⏳ Upcoming Match</h2>
<p>Scorecard will be available after match.</p>
`;
}

document.getElementById("scorecard").innerHTML = data;
document.getElementById("modal").style.display = "block";
}

function closeModal(){
document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
