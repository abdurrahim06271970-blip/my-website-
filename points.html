<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Points Table</title>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      margin: 0;
      text-align: center;
    }

    .menu {
      background: green;
      padding: 15px;
    }

    .menu a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
      padding-bottom: 5px;
    }

    .menu a.active {
      border-bottom: 3px solid white;
    }

    h1 {
      color: green;
      margin: 20px;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 95%;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
    }

    th {
      background: green;
      color: white;
    }

    /* 🔥 TOP TEAM STYLE */
    .top-team {
      background: #d4edda;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="menu">
    <a href="index.html">Home</a>
    <a href="fixtures.html">Fixtures</a>
    <a href="points.html" class="active">Points Table</a>
    <a href="squad.html">Teams</a>
  </div>

  <h1>📊 Points Table</h1>

  <table id="pointsTable">
    <tr>
      <th>Team</th>
      <th>Match</th>
      <th>Won</th>
      <th>Lost</th>
      <th>Points</th>
      <th>NRR</th>
    </tr>

    <tr>
      <td>Team A</td>
      <td>2</td>
      <td>2</td>
      <td>0</td>
      <td>4</td>
      <td>+0.50</td>
    </tr>

    <tr>
      <td>Team B</td>
      <td>2</td>
      <td>1</td>
      <td>1</td>
      <td>2</td>
      <td>+0.10</td>
    </tr>

    <tr>
      <td>Team C</td>
      <td>2</td>
      <td>0</td>
      <td>2</td>
      <td>0</td>
      <td>-0.30</td>
    </tr>
  </table>

  <!-- 🔥 AUTO SORT SCRIPT -->
  <script>
    let table = document.getElementById("pointsTable");
    let rows = Array.from(table.rows).slice(1);

    rows.sort((a, b) => {
      let pointsA = parseInt(a.cells[4].innerText);
      let pointsB = parseInt(b.cells[4].innerText);
      return pointsB - pointsA;
    });

    rows.forEach((row, index) => {
      row.cells[0].innerText = (index + 1) + ". " + row.cells[0].innerText;
      table.appendChild(row);

      // 🔥 highlight top team
      if(index === 0){
        row.classList.add("top-team");
      }
    });
  </script>

</body>
</html>
