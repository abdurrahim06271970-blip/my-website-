<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Points Table</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f2f2f2;
  text-align:center;
}

/* MENU */
.menu{
  background:green;
  padding:15px;
}
.menu a{
  color:white;
  margin:0 10px;
  text-decoration:none;
  font-weight:bold;
}
.menu a.active{
  border-bottom:3px solid white;
}

/* TABLE */
table{
  margin:20px auto;
  width:95%;
  border-collapse:collapse;
  background:white;
}
th,td{
  border:1px solid #ddd;
  padding:10px;
}
th{
  background:green;
  color:white;
}

/* TEAM COLORS */
.team-a{ color:#e74c3c; font-weight:bold; }
.team-b{ color:#3498db; font-weight:bold; }
.team-c{ color:#2ecc71; font-weight:bold; }

.badge{
  padding:3px 8px;
  border-radius:10px;
  color:white;
  font-size:12px;
}

/* badge colors */
.a{background:#e74c3c;}
.b{background:#3498db;}
.c{background:#2ecc71;}
</style>

</head>

<body>

<div class="menu">
  <a href="index.html">Home</a>
  <a href="fixtures.html">Fixtures</a>
  <a href="points.html" class="active">Points Table</a>
  <a href="squad.html">Teams</a>
</div>

<h1>📊 Points Table</h1>

<table>
<tr>
  <th>Team</th>
  <th>Match</th>
  <th>Won</th>
  <th>Lost</th>
  <th>Points</th>
  <th>NRR</th>
</tr>

<tr>
  <td class="team-a">1. Team A <span class="badge a">A</span></td>
  <td>3</td>
  <td>2</td>
  <td>1</td>
  <td>4</td>
  <td>0.45</td>
</tr>

<tr>
  <td class="team-b">2. Team B <span class="badge b">B</span></td>
  <td>3</td>
  <td>2</td>
  <td>1</td>
  <td>4</td>
  <td>0.20</td>
</tr>

<tr>
  <td class="team-c">3. Team C <span class="badge c">C</span></td>
  <td>3</td>
  <td>1</td>
  <td>2</td>
  <td>2</td>
  <td>-0.10</td>
</tr>

</table>

</body>
</html>
